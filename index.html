<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Amrish Bhai</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ================= BODY ================= */

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    position:relative;

    background:linear-gradient(
    -45deg,
    #ff0080,
    #6a00ff,
    #00c3ff,
    #ff6600
    );

    background-size:400% 400%;

    animation:bgMove 12s ease infinite;

    padding:25px;
}

/* Animated Background */

@keyframes bgMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* ================= GLOW EFFECT ================= */

.glow{

    position:absolute;

    width:320px;
    height:320px;

    border-radius:50%;

    background:rgba(255,255,255,0.12);

    filter:blur(90px);

    animation:glowMove 8s infinite alternate;
}

.glow:nth-child(1){

    top:-120px;
    left:-120px;
}

.glow:nth-child(2){

    bottom:-120px;
    right:-120px;
}

@keyframes glowMove{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(40px);
    }
}

/* ================= BALLOONS ================= */

.balloon{

    position:absolute;

    bottom:-120px;

    width:60px;
    height:75px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

    font-size:18px;
    font-weight:bold;

    box-shadow:0 0 20px rgba(255,255,255,0.5);

    animation:float 10s linear infinite;
}

.balloon::after{

    content:'';

    position:absolute;

    width:2px;
    height:65px;

    background:white;

    top:75px;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    100%{
        transform:translateY(-130vh);
    }
}

/* ================= CARD ================= */

.card{

    width:100%;
    max-width:390px;

    min-height:650px;

    position:relative;
    z-index:10;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    border:2px solid rgba(255,255,255,0.25);

    border-radius:35px;

    padding:35px 25px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    gap:22px;

    overflow:hidden;

    box-shadow:
    0 0 25px rgba(255,255,255,0.2),
    0 10px 50px rgba(0,0,0,0.35);

    animation:cardGlow 4s infinite alternate;
}

/* Card Glow */

@keyframes cardGlow{

    from{

        box-shadow:
        0 0 20px #ff00ff,
        0 10px 50px rgba(0,0,0,0.35);
    }

    to{

        box-shadow:
        0 0 35px #00c3ff,
        0 10px 50px rgba(0,0,0,0.35);
    }
}

/* ================= IMAGE ================= */

.card img{

    width:180px;
    height:180px;

    border-radius:50%;

    object-fit:cover;

    border:6px solid white;

    box-shadow:
    0 0 20px #fff,
    0 0 40px #ff00ff;

    animation:zoom 3s infinite alternate;
}

@keyframes zoom{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.06);
    }
}

/* ================= HEADING ================= */

.card h1{

    font-size:clamp(30px,7vw,44px);

    line-height:1.4;

    font-weight:800;

    background:linear-gradient(
    90deg,
    #ffffff,
    #ffe600,
    #ffffff
    );

    background-size:200% auto;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 20px rgba(255,255,255,0.4);

    animation:shine 4s linear infinite;
}

/* Heading Shine */

@keyframes shine{

    0%{
        background-position:-200px;
    }

    100%{
        background-position:200px;
    }
}

/* ================= SHAYARI ================= */

.shayari{

    font-size:18px;

    line-height:34px;

    color:white;

    font-weight:600;

    text-shadow:0 0 10px rgba(0,0,0,0.4);

    padding:0 10px;
}

/* ================= BUTTON ================= */

.btn{

    padding:15px 38px;

    border:none;

    border-radius:50px;

    background:linear-gradient(
    45deg,
    #ff0080,
    #ff9900
    );

    color:white;

    font-size:19px;
    font-weight:700;

    cursor:pointer;

    transition:0.4s;

    box-shadow:
    0 0 20px rgba(255,255,255,0.3);
}

.btn:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 20px #fff,
    0 0 40px #ff00ff;
}

/* ================= TOP TEXT ================= */

.topText{

    position:fixed;

    top:-100px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-size:34px;
    font-weight:bold;

    text-shadow:
    0 0 15px #fff,
    0 0 30px #ff00ff;

    opacity:0;

    transition:1s;

    z-index:100;
}

.topText.show{

    top:30px;

    opacity:1;
}

/* ================= SIGNATURE ================= */

.signature{

    position:fixed;

    bottom:20px;
    right:20px;

    color:white;

    font-size:15px;
    font-weight:bold;

    display:none;

    text-shadow:
    0 0 10px #fff,
    0 0 20px #ff00ff;
}

/* ================= EMOJI RAIN ================= */

@keyframes fall{

    to{

        transform:
        translateY(110vh)
        rotate(360deg);

        opacity:0;
    }
}

/* ================= MOBILE RESPONSIVE FIX ================= */

@media(max-width:768px){

    body{

        padding:15px;

        overflow-x:hidden;
    }

    /* CARD */

    .card{

        width:100%;

        max-width:100%;

        min-height:auto;

        padding:28px 18px;

        border-radius:28px;

        gap:18px;
    }

    /* IMAGE */

    .card img{

        width:140px;
        height:140px;
    }

    /* HEADING */

    .card h1{

        font-size:28px;

        line-height:1.3;
    }

    /* SHAYARI */

    .shayari{

        font-size:15px;

        line-height:28px;

        padding:0 5px;
    }

    /* BUTTON */

    .btn{

        width:100%;

        max-width:250px;

        padding:14px 20px;

        font-size:17px;
    }

    /* TOP TEXT */

    .topText{

        width:90%;

        text-align:center;

        font-size:22px;

        line-height:1.4;
    }

    /* BALLOONS */

    .balloon{

        width:50px;
        height:65px;

        font-size:15px;
    }

    .balloon::after{

        height:50px;

        top:65px;
    }

}

/* EXTRA SMALL DEVICES */

@media(max-width:480px){

    .card{

        padding:25px 15px;
    }

    .card img{

        width:120px;
        height:120px;
    }

    .card h1{

        font-size:24px;
    }

    .shayari{

        font-size:14px;

        line-height:24px;
    }

    .btn{

        font-size:16px;

        padding:12px 18px;
    }

    .signature{

        font-size:12px;

        right:10px;

        bottom:10px;
    }

}

</style>
</head>

<body>

<!-- Glow Effects -->

<div class="glow"></div>
<div class="glow"></div>

<!-- Balloons -->

<div class="balloon" style="left:8%;background:#ff004c;">H</div>

<div class="balloon" style="left:22%;background:#ff9500;">A</div>

<div class="balloon" style="left:36%;background:#00c3ff;">P</div>

<div class="balloon" style="left:50%;background:#00ff88;">P</div>

<div class="balloon" style="left:64%;background:#ae00ff;">Y</div>

<div class="balloon" style="left:78%;background:#ff00c8;">🎂</div>

<!-- Main Card -->

<div class="card">

    <img src="amirshpic.jpeg" alt="Birthday Photo">

    <h1>
        🎂 Happy Birthday <br>
        Amrish Bhai 🎉
    </h1>

    <div class="shayari">

        “चेहरे पर मुस्कान यूँ ही खिली रहे,<br>

        जिंदगी की हर शाम रंगीन रहे,<br>

        ऊपर वाला इतनी खुशियाँ दे तुम्हें,<br>

        कि हर खुशी तुम्हारी दीवानी रहे!” 🎉🥳

    </div>

    <button class="btn" onclick="celebrate()">

        Celebrate 🎊

    </button>

</div>

<!-- Top Celebration -->

<div class="topText" id="topText">

    🎂 Happy Birthday Amrish Bhai 🎉

</div>

<!-- Signature -->

<div class="signature" id="signature">

    Made With ❤️ By Vikash

</div>

<!-- Music -->

<audio id="music" src="music-box-birthday.mp3"></audio>

<script>

/* ================= CELEBRATION ================= */

function celebrate(){

    // Top Text Show

    document
    .getElementById("topText")
    .classList.add("show");

    // Signature Show

    document
    .getElementById("signature")
    .style.display="block";

    // Music Play

    document
    .getElementById("music")
    .play();

    // Emoji Rain

    for(let i=0;i<80;i++){

        let emoji=document.createElement("div");

        emoji.innerHTML=
        ["🎉","🎂","🎈","🥳","🎊","🍰","✨"]
        [Math.floor(Math.random()*7)];

        emoji.style.position="absolute";

        emoji.style.left=
        Math.random()*100+"vw";

        emoji.style.top="-50px";

        emoji.style.fontSize=
        (Math.random()*20+20)+"px";

        emoji.style.animation=
        `fall ${Math.random()*3+3}s linear`;

        document.body.appendChild(emoji);

        setTimeout(()=>{

            emoji.remove();

        },6000);
    }
}

</script>

</body>
</html>
