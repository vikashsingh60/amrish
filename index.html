<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Happy Birthday Amrish Bhai</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #050505;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
    padding: 10px; 
}

/* Background Effects */
.bg-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #ff0080, #6a00ff, #00c3ff);
    filter: blur(100px);
    opacity: 0.15;
    z-index: 0;
}

/* Fancy Letter Balloons */
.balloon-zone {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 1;
}

.letter-balloon {
    position: absolute;
    bottom: -100px;
    width: 50px;
    height: 65px;
    background: radial-gradient(circle at 30% 30%, #fff, currentColor);
    border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    box-shadow: inset -4px -4px 10px rgba(0,0,0,0.3);
    animation: floatUp var(--d) linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); left: var(--l); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-120vh) rotate(20deg); left: calc(var(--l) + 15px); opacity: 0; }
}

/* --- LARGE PREMIUM CARD --- */
.card {
    width: 95%; /* Mobile par full look */
    max-width: 440px; /* PC par normal size */
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 40px;
    padding: 50px 25px; /* Vertical padding badha di */
    text-align: center;
    position: relative;
    z-index: 10;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    gap: 25px; /* Elements ke beech gap badhaya */
    align-items: center;
}

.card img {
    width: 190px; /* Badi Photo */
    height: 190px;
    border-radius: 50%;
    object-fit: cover;
    border: 6px solid #fff;
    box-shadow: 0 0 30px #ff0080, 0 0 60px rgba(255,0,128,0.3);
    animation: zoomPulse 3s infinite alternate;
}

@keyframes zoomPulse {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
}

.card h1 {
    font-size: 36px; /* Badi heading */
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.card h1 span {
    font-family: 'Great Vibes', cursive;
    color: #ffe600;
    font-size: 52px; /* Amrish Bhai naam bada kar diya */
    display: block;
    margin-top: 8px;
    filter: drop-shadow(0 0 10px rgba(255, 230, 0, 0.6));
}

.shayari {
    font-size: 19px; /* Shayari text bada kiya */
    line-height: 1.8;
    color: #fff;
    font-weight: 500;
    background: rgba(255, 255, 255, 0.06);
    padding: 25px 15px;
    border-radius: 25px;
    border-left: 6px solid #ff0080;
    width: 100%;
}

.btn {
    width: 100%;
    padding: 22px; /* Bada button */
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #ff0080, #ff9900);
    color: white;
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(255, 0, 128, 0.5);
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn:active { transform: scale(0.95); }

/* Celebration Overlay */
.top-msg {
    position: fixed;
    top: -100px;
    width: 100%;
    text-align: center;
    color: #fff;
    font-size: 26px;
    font-weight: 800;
    text-shadow: 0 0 20px #ff0080;
    transition: 0.6s ease-out;
    z-index: 100;
    padding: 0 10px;
}
.top-msg.active { top: 35px; }

.signature {
    position: fixed;
    bottom: 25px;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    font-weight: bold;
    display: none;
    z-index: 100;
    letter-spacing: 1px;
}

/* --- MOBILE SPECIFIC FIXES --- */
@media screen and (max-width: 480px) {
    body { padding: 10px; }

    .card {
        width: 92%; /* Screen ke side gap kam kar diye */
        padding: 55px 20px;
        gap: 35px; /* Elements ko aur door kiya taaki screen bhari lage */
        border-radius: 40px;
    }
    
    .card img {
        width: 180px;
        height: 180px;
    }

    .card h1 { font-size: 32px; }
    .card h1 span { font-size: 48px; }

    .shayari {
        font-size: 17px;
        padding: 25px 12px;
    }

    .btn {
        font-size: 20px;
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- Letter Balloons -->
<div class="balloon-zone" id="balloonZone"></div>

<div class="top-msg" id="topMsg">🎉 Happy Birthday Amrish Bhai! 🎉</div>

<!-- Card -->
<div class="card">
    <img src="amirshpic.jpeg" alt="Amrish Bhai">

    <h1>Happy Birthday <br> <span>Amrish Bhai</span></h1>

    <div class="shayari">
        “चेहरे पर मुस्कान यूँ ही खिली रहे,<br>
        जिंदगी की हर शाम रंगीन रहे,<br>
        ऊपर वाला इतनी खुशियाँ दे तुम्हें,<br>
        कि हर खुशी तुम्हारी दीवानी रहे!” 🎉🥳
    </div>

    <button class="btn" onclick="celebrate()">CELEBRATE 🎊</button>
</div>

<!-- Signature -->
<div class="signature" id="signature">Designed by Vikash Singh</div>

<audio id="music" src="music-box-birthday.mp3" loop></audio>

<script>
// Balloon Logic
const text = "HAPPYBIRTHDAYAMRISHBHAI";
const colors = ['#ff0080', '#6a00ff', '#00c3ff', '#ff9900', '#00ff88', '#ae00ff'];

function createLetterBalloons() {
    const zone = document.getElementById('balloonZone');
    for(let i=0; i < text.length; i++) {
        setTimeout(() => {
            const b = document.createElement('div');
            b.className = 'letter-balloon';
            b.innerHTML = text[i];
            
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const randomLeft = Math.random() * 85 + 5;
            const duration = Math.random() * 4 + 5;
            
            b.style.color = randomColor;
            b.style.setProperty('--l', randomLeft + '%');
            b.style.setProperty('--d', duration + 's');
            
            zone.appendChild(b);
            setTimeout(() => b.remove(), duration * 1000);
        }, i * 350);
    }
}

createLetterBalloons();
setInterval(createLetterBalloons, 12000);

function celebrate(){
    document.getElementById("topMsg").classList.add("active");
    document.getElementById("signature").style.display = "block";

    let audio = document.getElementById("music");
    audio.play().catch(() => console.log("Music play blocked by browser"));

    // Confetti Rain
    for(let i=0; i<100; i++){
        let emoji = document.createElement("div");
        emoji.innerHTML = ["🎉","🎂","🎈","🥳","🎊","✨"][Math.floor(Math.random()*6)];
        emoji.style.position = "fixed";
        emoji.style.left = Math.random() * 100 + "vw";
        emoji.style.top = "-50px";
        emoji.style.fontSize = (Math.random() * 30 + 20) + "px";
        emoji.style.zIndex = "1000";
        emoji.style.pointerEvents = "none";
        emoji.style.animation = `fallDown ${Math.random() * 3 + 2}s linear forwards`;
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 5000);
    }
}

// Falling Animation Style
const s = document.createElement('style');
s.innerHTML = `@keyframes fallDown { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }`;
document.head.appendChild(s);
</script>

</body>
</html>
