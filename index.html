<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Happy Birthday Amrish Bhai</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
/* Reset & Base Setup */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html, body {
    height: 100%;
    width: 100%;
    overflow: hidden; /* Screen se bahar kuch nahi jayega */
    background: #0a0a0a;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
    padding: 15px;
}

/* Moving Background Glows */
.bg-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #ff0080, #6a00ff, #00c3ff);
    filter: blur(120px);
    opacity: 0.2;
    z-index: 0;
    animation: moveGlow 10s infinite alternate;
}

@keyframes moveGlow {
    0% { transform: scale(1); }
    100% { transform: scale(1.3); }
}

/* Fancy Letter Balloons */
.balloon-zone {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 1;
}

.letter-balloon {
    position: absolute;
    bottom: -100px;
    width: 45px;
    height: 60px;
    background: radial-gradient(circle at 30% 30%, #fff, currentColor);
    border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    box-shadow: inset -4px -4px 10px rgba(0,0,0,0.3);
    animation: floatUp var(--d) linear infinite;
}

.letter-balloon::after {
    content: '';
    position: absolute;
    bottom: -25px;
    width: 1px;
    height: 25px;
    background: rgba(255,255,255,0.4);
}

@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); left: var(--l); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-120vh) rotate(20deg); left: calc(var(--l) + 15px); opacity: 0; }
}

/* Premium Card Design */
.card {
    width: 100%;
    max-width: 380px; /* PC Width */
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 35px;
    padding: 35px 25px;
    text-align: center;
    position: relative;
    z-index: 10;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
}

.card img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #fff;
    box-shadow: 0 0 25px #ff0080;
    animation: zoomPulse 3s infinite alternate;
}

@keyframes zoomPulse {
    from { transform: scale(1); }
    to { transform: scale(1.06); }
}

.card h1 {
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
}

.card h1 span {
    font-family: 'Great Vibes', cursive;
    color: #ffe600;
    font-size: 40px;
    display: block;
    margin-top: 5px;
    text-shadow: 0 0 10px rgba(255, 230, 0, 0.5);
}

/* ORIGINAL SHAYARI (No changes) */
.shayari {
    font-size: 17px;
    line-height: 1.8;
    color: #fff;
    font-weight: 500;
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    border-radius: 20px;
    border-left: 4px solid #ff0080;
}

.btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #ff0080, #ff9900);
    color: white;
    font-size: 19px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(255, 0, 128, 0.3);
    transition: 0.3s;
}

.btn:active { transform: scale(0.95); }

/* Celebration UI */
.top-msg {
    position: fixed;
    top: -100px;
    width: 100%;
    text-align: center;
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    text-shadow: 0 0 15px #ff0080;
    transition: 0.6s ease-out;
    z-index: 100;
}
.top-msg.active { top: 30px; }

.signature {
    position: fixed;
    bottom: 15px;
    right: 15px;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    font-weight: 600;
    display: none;
    z-index: 100;
}

/* Mobile Responsive Adjustments */
@media screen and (max-width: 480px) {
    .card {
        max-width: 100%; /* Mobile par full width */
        padding: 45px 20px; /* Thoda bada padding */
        gap: 25px;
    }
    
    .card img {
        width: 150px;
        height: 150px;
    }

    .card h1 { font-size: 28px; }
    .card h1 span { font-size: 36px; }

    .shayari {
        font-size: 15px;
        line-height: 1.7;
    }

    .letter-balloon {
        width: 35px;
        height: 50px;
        font-size: 16px;
    }
}

/* Fall Animation for Confetti */
@keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- Letter Balloons Container -->
<div class="balloon-zone" id="balloonZone"></div>

<div class="top-msg" id="topMsg">🎉 Happy Birthday Amrish Bhai! 🎉</div>

<!-- Main Card -->
<div class="card">
    <img src="amirshpic.jpeg" alt="Amrish Bhai">

    <h1>Happy Birthday <br> <span>Amrish Bhai</span></h1>

    <div class="shayari">
        “चेहरे पर मुस्कान यूँ ही खिली रहे,<br>
        जिंदगी की हर शाम रंगीन रहे,<br>
        ऊपर वाला इतनी खुशियाँ दे तुम्हें,<br>
        कि हर खुशी तुम्हारी दीवानी रहे!” 🎉🥳
    </div>

    <button class="btn" onclick="celebrate()">Celebrate 🎊</button>
</div>

<!-- Signature (As requested) -->
<div class="signature" id="signature">Made With ❤️ By Vikash Singh</div>

<audio id="music" src="music-box-birthday.mp3" loop></audio>

<script>
// Balloon Configuration
const text = "HAPPYBIRTHDAYAMRISHBHAI";
const colors = ['#ff0080', '#6a00ff', '#00c3ff', '#ff9900', '#00ff88', '#ae00ff'];

function createLetterBalloons() {
    const zone = document.getElementById('balloonZone');
    for(let i=0; i < text.length; i++) {
        setTimeout(() => {
            const b = document.createElement('div');
            b.className = 'letter-balloon';
            b.innerHTML = text[i];
            
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const randomLeft = Math.random() * 85 + 5;
            const duration = Math.random() * 3 + 6;
            
            b.style.color = randomColor;
            b.style.setProperty('--l', randomLeft + '%');
            b.style.setProperty('--d', duration + 's');
            
            zone.appendChild(b);
            
            // Remove balloon after it floats away
            setTimeout(() => b.remove(), duration * 1000);
        }, i * 350);
    }
}

// Start floating balloons immediately and repeat
createLetterBalloons();
setInterval(createLetterBalloons, 12000);

function celebrate(){
    // UI Effects
    document.getElementById("topMsg").classList.add("active");
    document.getElementById("signature").style.display = "block";

    // Play Music
    let audio = document.getElementById("music");
    audio.play().catch(() => console.log("Music needs interaction"));

    // Confetti Rain
    for(let i=0; i<80; i++){
        let emoji = document.createElement("div");
        emoji.innerHTML = ["🎉","🎂","🎈","🥳","🎊","✨"][Math.floor(Math.random()*6)];
        emoji.style.position = "fixed";
        emoji.style.left = Math.random() * 100 + "vw";
        emoji.style.top = "-50px";
        emoji.style.fontSize = (Math.random() * 20 + 20) + "px";
        emoji.style.zIndex = "1000";
        emoji.style.pointerEvents = "none";
        emoji.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
        
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 5000);
    }
}
</script>

</body>
</html>
